version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:18-alpine
    container_name: nuestra-memoria-postgres
    env_file:
      - ./envs/production.env
    environment:
      POSTGRES_USER: ${DB_USER:-labeling_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-labeling_app}
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-labeling_app} -d ${DB_NAME:-labeling_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labeling_network
    restart: unless-stopped
    shm_size: "256m"
    stop_grace_period: 30s
    mem_limit: 2g
    cpus: 1.50
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis para sesiones distribuidas
  redis:
    image: redis:8-alpine
    container_name: nuestra-memoria-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_password_change_me} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labeling_network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Aplicación Flask
  web_app:
    build:
      context: .
      dockerfile: docker/web_app/Dockerfile
    container_name: nuestra-memoria-flask
    env_file:
      - ./envs/production.env
    environment:
      FLASK_APP: src/wsgi.py
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-labeling_app}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-labeling_app}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-random-secret-key-in-production}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      DEBUG: "False"
      LOG_LEVEL: INFO
      SESSION_TYPE: redis
      HOST: 0.0.0.0
      PORT: 3000
      WORKERS: ${WORKERS:-4}
      WORKER_CLASS: ${WORKER_CLASS:-gthread}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data/backups:/app/data/backups
      - ./data/transcription_projects:/app/data/transcription_projects
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - labeling_network
    restart: unless-stopped
    stop_grace_period: 45s
    mem_limit: 3g
    cpus: 2.00
    pids_limit: 512
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    tmpfs:
      - /tmp:size=256m,noexec,nosuid
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Nginx como reverse proxy con SSL
  nginx:
    image: nginx:alpine
    container_name: nuestra-memoria-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web_app
    networks:
      - labeling_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # PgAdmin para gestión de BD (opcional, para desarrollo)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nuestra-memoria-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres
    networks:
      - labeling_network
    restart: unless-stopped
    profiles: ["admin"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  labeling_network:
    driver: bridge
